<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>JOTO — Карточки WB</title>
<style>
:root{
  --accent:#CCFF00; --accent-ink:#0A0A0A; --accent-deep:#9bc400;
  --serif: Georgia, "Times New Roman", serif;
  --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --r:12px; --ease:cubic-bezier(.2,.7,.2,1);
}
[data-theme="light"]{
  --bg:#F1F1EE; --surface:#FFFFFF; --surface-2:#F7F7F4;
  --ink:#0B0B0C; --ink-2:#56564F; --ink-3:#8E8E86;
  --line:#E4E4DE; --line-strong:#0B0B0C; --field:#FFFFFF;
  --ok:#2f8f4e; --err:#e0483a;
  --shadow:0 1px 2px rgba(11,11,12,.04), 0 18px 44px -28px rgba(11,11,12,.35);
}
[data-theme="dark"]{
  --bg:#0A0A0B; --surface:#141416; --surface-2:#1B1B1E;
  --ink:#F3F3EE; --ink-2:#A9A9A2; --ink-3:#73736C;
  --line:#27272B; --line-strong:#3A3A40; --field:#0F0F11;
  --ok:#5fd083; --err:#ff6a5c;
  --shadow:0 1px 0 rgba(255,255,255,.02), 0 24px 60px -30px rgba(0,0,0,.9);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;min-height:100vh}
.stage{width:100%;max-width:1080px;margin:0 auto;padding:26px 20px 60px}
.head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.wordmark{font-style:italic;font-weight:900;font-size:30px;letter-spacing:-.04em;text-transform:lowercase}
.screen-title{font-family:var(--serif);font-style:italic;font-weight:400;font-size:26px;margin:2px 0 0}
.head-right{display:flex;gap:8px;align-items:center}
.block{background:var(--surface);border:1.5px solid var(--line);border-radius:calc(var(--r) + 4px);
  padding:20px;margin-bottom:18px;box-shadow:var(--shadow)}
.block h2{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-2);margin:0 0 14px}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.field{display:flex;flex-direction:column;gap:7px;flex:1;min-width:170px}
.field.grow2{flex:2}
.label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:var(--ink-2)}
input[type=text],select,textarea{width:100%;font-family:var(--sans);font-size:15px;color:var(--ink);
  background:var(--field);border:1.5px solid var(--line);border-radius:var(--r);padding:11px 13px;outline:none;
  transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;appearance:none}
textarea{min-height:84px;resize:vertical;font-family:var(--sans)}
select:focus,input:focus,textarea:focus{border-color:var(--line-strong);
  box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 26%, transparent)}
.btn{font-weight:700;font-size:14px;padding:12px 18px;border-radius:var(--r);cursor:pointer;border:1.5px solid var(--ink);
  background:var(--ink);color:#fff;display:inline-flex;align-items:center;gap:9px;justify-content:center;
  transition:transform .14s var(--ease),filter .15s}
[data-theme="dark"] .btn{color:#0A0A0A}
.btn:hover{transform:translateY(-1px)}
.btn[disabled]{opacity:.55;cursor:default;transform:none}
.btn.secondary{background:transparent;color:var(--ink);border-color:var(--line-strong)}
[data-theme="dark"] .btn.secondary{color:var(--ink)}
.btn.accent{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.btn.sm{padding:8px 12px;font-size:13px}
.btn .spin{display:none;width:15px;height:15px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite}
.btn.loading .spin{display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.muted{color:var(--ink-3);font-size:13px}
.note{font-size:12.5px;color:var(--ink-2);margin:8px 0 0;line-height:1.5}
.status{margin-top:14px;font-size:14px;font-weight:600;display:none;align-items:center;gap:8px;line-height:1.45}
.status.show{display:flex}
.status.ok{color:var(--ok)}
.status.err{color:var(--err)}
.picker{border:1.5px solid var(--line);border-radius:var(--r);background:var(--field);max-height:300px;overflow:auto}
.picker-tools{display:flex;gap:8px;padding:10px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--field);z-index:2}
.picker-tools input{flex:1}
.pick-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line);cursor:pointer}
.pick-row:last-child{border-bottom:none}
.pick-row:hover{background:var(--surface-2)}
.pick-row input{width:18px;height:18px;flex:none}
.pick-vc{font-family:var(--mono);font-weight:600;font-size:13.5px}
.pick-meta{font-size:12px;color:var(--ink-3)}
.pick-row .grow{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.pick-row .grow span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.selcount{font-size:13px;color:var(--ink-2);font-weight:600}
#theme-toggle{width:38px;height:38px;border-radius:50%;cursor:pointer;display:grid;place-items:center;font-size:14px;
  background:var(--surface);color:var(--ink-2);border:1.5px solid var(--line)}
</style>
</head>
<body>
<div class="stage">
  <header class="head">
    <div class="brand">
      <span class="wordmark">joto</span>
      <div>
        <h1 class="screen-title">Карточки WB</h1>
        <div class="muted">Массовое редактирование карточек Wildberries</div>
      </div>
    </div>
    <div class="head-right">
      <button id="theme-toggle" type="button" title="Тема">☾</button>
    </div>
  </header>

  <section id="panel-edit">
    <div class="block">
      <h2>1 · Выбор карточек</h2>
      <div class="row">
        <div class="field grow2">
          <label class="label" for="searchInp">Поиск по артикулу / названию (необязательно)</label>
          <input id="searchInp" type="text" placeholder="например: J05 или худи" autocomplete="off">
        </div>
        <button class="btn" id="loadBtn" type="button"><span class="spin"></span><span class="lbl">Загрузить карточки с WB</span></button>
      </div>
      <div id="pickerWrap" style="margin-top:14px" hidden>
        <div class="picker" id="picker"></div>
        <div class="row" style="margin-top:10px;justify-content:space-between">
          <span class="selcount" id="selCount">Выбрано: 0</span>
          <div style="display:flex;gap:8px">
            <button class="btn secondary sm" id="selAll" type="button">Выбрать все</button>
            <button class="btn secondary sm" id="selNone" type="button">Снять выбор</button>
          </div>
        </div>
      </div>
    </div>

    <div class="block" id="editFields" hidden>
      <h2>2 · Что менять</h2>
      <div class="row">
        <div class="field">
          <label class="label" for="fieldSel">Поле</label>
          <select id="fieldSel">
            <option value="description">SEO-описание</option>
            <option value="title">Название</option>
            <option value="brand">Бренд</option>
            <option value="vendorCode">Артикул (vendorCode)</option>
            <option value="subjectID">Категория</option>
            <option value="characteristic">Характеристика</option>
            <option value="barcode">Баркод (добавить)</option>
          </select>
        </div>
        <div class="field" id="charcPickWrap" hidden>
          <label class="label" for="charcSel">Характеристика</label>
          <select id="charcSel"></select>
        </div>
        <div class="field" id="subjPickWrap" hidden>
          <label class="label" for="subjSel">Новая категория</label>
          <select id="subjSel"><option value="">— загрузка —</option></select>
        </div>
      </div>

      <div class="row" style="margin-top:14px">
        <div class="field grow2" id="valTextWrap">
          <label class="label" for="valText">Новое значение</label>
          <textarea id="valText" placeholder="Введите новое значение для всех выбранных карточек"></textarea>
        </div>
        <div class="field" id="valLineWrap" hidden>
          <label class="label" for="valLine">Новое значение</label>
          <input id="valLine" type="text" autocomplete="off">
        </div>
        <button class="btn secondary" id="genBarcodeBtn" type="button" hidden><span class="spin"></span><span class="lbl">Сгенерировать баркод</span></button>
      </div>
      <p class="note" id="editNote"></p>

      <button class="btn accent" id="applyBtn" type="button" style="margin-top:16px">
        <span class="spin"></span><span class="lbl">Проверить и отправить на WB</span>
      </button>

      <div id="confirmBox" class="block" style="display:none;margin-top:14px;border:1.5px solid var(--accent)">
        <div id="confirmText" style="font-weight:700;margin-bottom:10px"></div>
        <div id="confirmPreview" style="white-space:pre-line;font-family:var(--mono);font-size:12.5px;color:var(--ink-2);max-height:190px;overflow:auto;background:var(--surface-2);border-radius:8px;padding:10px"></div>
        <div class="row" style="margin-top:14px;gap:8px">
          <button class="btn accent" id="confirmApply" type="button"><span class="spin"></span><span class="lbl">Подтвердить — отправить на WB</span></button>
          <button class="btn secondary" id="confirmCancel" type="button">Отмена</button>
        </div>
      </div>

      <div class="status" id="editStatus"></div>
    </div>
  </section>
</div>

<script>
/* ---------- Bitrix embed ---------- */
function fit(){ try{ if(typeof BX24!=="undefined"&&BX24.fitWindow) BX24.fitWindow(); }catch(e){} }
(function(){
  var q=location.search||"";
  var inB=/[?&](DOMAIN|APP_SID|AUTH_ID)=/i.test(q)||/bitrix/i.test(document.referrer||"");
  if(!inB) return;
  var s=document.createElement("script"); s.src="//api.bitrix24.com/api/v1/";
  s.onload=function(){ try{ if(typeof BX24!=="undefined") BX24.init(function(){fit();}); }catch(e){} };
  document.head.appendChild(s);
})();

var $=function(id){return document.getElementById(id);};
function spinOn(btn,on,txt){ if(!btn)return; btn.classList.toggle("loading",on); btn.disabled=on;
  var l=btn.querySelector(".lbl"); if(l&&txt!=null) l.textContent=txt; }
function showStatus(el,ok,msg){ el.className="status show "+(ok?"ok":"err"); el.textContent=(ok?"✓ ":"⚠ ")+msg; fit(); }
async function api(url,opts){ var r=await fetch(url,opts); return await r.json(); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(ch){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[ch];}); }

var ALL_CARDS=[];          // simplified карточки с WB
var selected=new Set();    // nmID выбранных

$("loadBtn").addEventListener("click",async function(){
  spinOn($("loadBtn"),true,"Загружаю…");
  try{
    var j=await api("/api/wb/cards?limit=1000&search="+encodeURIComponent($("searchInp").value.trim()));
    if(!j.ok){ alert("Ошибка WB: "+j.error); return; }
    ALL_CARDS=j.cards||[]; selected.clear();
    renderPicker(ALL_CARDS);
    $("pickerWrap").hidden=false;
    $("editFields").hidden=(ALL_CARDS.length===0);
    if(ALL_CARDS.length===0) alert("Карточки не найдены");
  }catch(e){ alert("Не удалось связаться с сервером"); }
  finally{ spinOn($("loadBtn"),false,"Загрузить карточки с WB"); fit(); }
});

function renderPicker(cards){
  var html='<div class="picker-tools"><input id="pickFilter" type="text" placeholder="фильтр по артикулу/названию"></div>';
  cards.forEach(function(c){
    html+='<label class="pick-row" data-vc="'+esc((c.vendorCode||"")+" "+(c.title||"")).toLowerCase()+'">'
      +'<input type="checkbox" value="'+c.nmID+'" '+(selected.has(c.nmID)?"checked":"")+'>'
      +'<span class="grow"><span class="pick-vc">'+esc(c.vendorCode||"—")+'</span>'
      +'<span class="pick-meta">'+esc(c.title||"")+' · '+esc(c.subjectName||"")+'</span></span></label>';
  });
  $("picker").innerHTML=html;
  $("picker").querySelectorAll('input[type=checkbox]').forEach(function(cb){
    cb.addEventListener("change",function(){
      var id=parseInt(cb.value,10);
      if(cb.checked) selected.add(id); else selected.delete(id);
      updateSelCount();
    });
  });
  var f=$("pickFilter");
  if(f) f.addEventListener("input",function(){
    var q=f.value.trim().toLowerCase();
    $("picker").querySelectorAll(".pick-row").forEach(function(r){
      r.style.display=(!q||r.dataset.vc.indexOf(q)>=0)?"":"none";
    });
  });
  updateSelCount();
}
function updateSelCount(){ $("selCount").textContent="Выбрано: "+selected.size; }
$("selAll").addEventListener("click",function(){
  $("picker").querySelectorAll('.pick-row').forEach(function(r){
    if(r.style.display==="none")return;
    var cb=r.querySelector("input"); cb.checked=true; selected.add(parseInt(cb.value,10));
  });
  updateSelCount();
});
$("selNone").addEventListener("click",function(){
  $("picker").querySelectorAll('input[type=checkbox]').forEach(function(cb){cb.checked=false;});
  selected.clear(); updateSelCount();
});

/* выбор поля «что менять» */
var fieldSel=$("fieldSel");
fieldSel.addEventListener("change",updateFieldUI);
function updateFieldUI(){
  var f=fieldSel.value;
  var bigText=(f==="description");
  $("valTextWrap").hidden=!bigText;
  $("valLineWrap").hidden=(bigText||f==="subjectID");
  $("charcPickWrap").hidden=(f!=="characteristic");
  $("subjPickWrap").hidden=(f!=="subjectID");
  $("genBarcodeBtn").hidden=(f!=="barcode");
  var note="";
  if(f==="vendorCode"||f==="barcode") note="⚠ Это поле уникально для каждой карточки — применяйте к одной карточке за раз.";
  if(f==="subjectID") note="⚠ Wildberries не всегда разрешает смену категории у существующей карточки — при отказе WB вернёт ошибку.";
  if(f==="characteristic") note="Список характеристик собран из выбранных карточек. Несколько значений вводите через запятую.";
  $("editNote").textContent=note;
  if(f==="characteristic") fillCharcSelect();
  if(f==="subjectID") loadSubjectsInto($("subjSel"));
  fit();
}
async function fillCharcSelect(){
  var sel=$("charcSel");
  sel.innerHTML='<option value="">— загрузка характеристик… —</option>';
  fit();
  var map={};        // id -> название
  var required={};   // id -> обязательная ли
  var subjects={};
  selectedCards().forEach(function(c){
    (c.characteristics||[]).forEach(function(ch){ if(ch.id!=null) map[ch.id]=ch.name; });
    if(c.subjectID!=null) subjects[c.subjectID]=true;
  });
  // подгружаем ПОЛНЫЙ список характеристик категории(й) выбранных карточек
  var ids=Object.keys(subjects);
  for(var i=0;i<ids.length;i++){
    try{
      var j=await api("/api/wb/charcs?subjectId="+ids[i]);
      if(j&&j.ok&&j.charcs){ j.charcs.forEach(function(ch){
        if(ch.id!=null){ map[ch.id]=ch.name; if(ch.required) required[ch.id]=true; }
      }); }
    }catch(e){}
  }
  var keys=Object.keys(map);
  if(keys.length===0){ sel.innerHTML='<option value="">— характеристики не найдены —</option>'; fit(); return; }
  // обязательные — наверх, дальше по алфавиту
  keys.sort(function(a,b){
    var ra=required[a]?0:1, rb=required[b]?0:1;
    if(ra!==rb) return ra-rb;
    return String(map[a]).localeCompare(String(map[b]));
  });
  sel.innerHTML=keys.map(function(id){
    return '<option value="'+id+'">'+esc(map[id])+(required[id]?" (обязательная)":"")+'</option>';
  }).join("");
  fit();
}

async function loadSubjectsInto(sel,name){
  try{
    var j=await api("/api/wb/subjects?name="+encodeURIComponent(name||""));
    if(!j.ok){ sel.innerHTML='<option value="">ошибка: '+esc(j.error)+'</option>'; return; }
    var html='<option value="">— выберите категорию —</option>';
    (j.subjects||[]).forEach(function(s){
      html+='<option value="'+s.subjectID+'">'+esc(s.subjectName)+(s.parentName?(' · '+esc(s.parentName)):"")+'</option>';
    });
    sel.innerHTML=html;
  }catch(e){ sel.innerHTML='<option value="">ошибка загрузки</option>'; }
}

/* генерация одного баркода (для поля «Баркод») */
$("genBarcodeBtn").addEventListener("click",async function(){
  spinOn($("genBarcodeBtn"),true,"…");
  try{
    var j=await api("/api/wb/barcodes",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({count:1})});
    if(j.ok&&j.barcodes&&j.barcodes.length){ $("valLine").value=j.barcodes[0]; }
    else alert("Не удалось получить баркод: "+(j.error||""));
  }catch(e){ alert("Ошибка генерации баркода"); }
  finally{ spinOn($("genBarcodeBtn"),false,"Сгенерировать баркод"); }
});

function selectedCards(){ return ALL_CARDS.filter(function(c){return selected.has(c.nmID);}); }

var FIELD_LABELS={description:"SEO-описание",title:"Название",brand:"Бренд",vendorCode:"Артикул",subjectID:"Категория",characteristic:"Характеристика",barcode:"Баркод"};
function truncate(s){ s=String(s==null?"":s); return s.length>44?s.slice(0,44)+"…":s; }
function findCharc(card,id){ var a=card.characteristics||[]; for(var i=0;i<a.length;i++){ if(a[i].id===id) return a[i]; } return null; }

/* шаг 1: собрать и проверить изменение */
function buildEditPayload(){
  var cards=selectedCards();
  if(cards.length===0){ showStatus($("editStatus"),false,"Не выбрано ни одной карточки"); return null; }
  var f=fieldSel.value;
  var value=(f==="description")?$("valText").value:$("valLine").value;
  var charcId=null,charcName=null;
  if(f==="characteristic"){
    charcId=parseInt($("charcSel").value,10);
    charcName=$("charcSel").selectedOptions[0]?$("charcSel").selectedOptions[0].textContent:null;
    if(charcName) charcName=charcName.replace(/\s*\(обязательная\)\s*$/,"");
    if(!charcId){ showStatus($("editStatus"),false,"Выберите характеристику"); return null; }
    value=$("valLine").value.split(",").map(function(s){return s.trim();}).filter(Boolean);
    if(value.length===0){ showStatus($("editStatus"),false,"Введите значение характеристики"); return null; }
  }
  if(f==="subjectID"){ value=$("subjSel").value; if(!value){ showStatus($("editStatus"),false,"Выберите категорию"); return null; } }
  if(f!=="characteristic" && f!=="subjectID" && (value===""||value==null)){ showStatus($("editStatus"),false,"Введите новое значение"); return null; }
  return { cards:cards, field:f, value:value, charcId:charcId, charcName:charcName, label:FIELD_LABELS[f]||f };
}

function previewText(p){
  var f=p.field, lines=[];
  var newv=Array.isArray(p.value)?p.value.join(", "):p.value;
  if(f==="subjectID"){ var opt=$("subjSel").selectedOptions[0]; newv=opt?opt.textContent:p.value; }
  p.cards.slice(0,8).forEach(function(c){
    var oldv;
    if(f==="characteristic"){ var ch=findCharc(c,p.charcId); oldv=ch?(ch.value||[]).join(", "):"—"; }
    else if(f==="subjectID"){ oldv=c.subjectName||"—"; }
    else if(f==="barcode"){ oldv=(c.barcodes||[]).join(", ")||"нет"; }
    else { oldv=c[f]; }
    if(f==="barcode") lines.push(c.vendorCode+":  + "+newv);
    else lines.push(c.vendorCode+":  "+truncate(oldv||"—")+"  →  "+truncate(newv));
  });
  if(p.cards.length>8) lines.push("…и ещё "+(p.cards.length-8)+" карточек");
  return lines.join("\n");
}

var pendingPayload=null;
$("applyBtn").addEventListener("click",function(){
  var p=buildEditPayload(); if(!p) return;
  pendingPayload=p;
  var warn=((p.field==="barcode"||p.field==="vendorCode")&&p.cards.length>1)
    ? "  ⚠ Это поле уникально для каждой карточки — не задавайте одно значение нескольким!" : "";
  $("confirmText").innerHTML="Будет изменено поле «"+esc(p.label)+"» у <b>"+p.cards.length+"</b> карточк(и) на Wildberries."+esc(warn);
  $("confirmPreview").textContent=previewText(p);
  $("confirmBox").style.display="block";
  $("editStatus").className="status";
  fit();
});
$("confirmCancel").addEventListener("click",function(){ $("confirmBox").style.display="none"; pendingPayload=null; fit(); });

/* шаг 2: подтверждение и отправка на WB */
$("confirmApply").addEventListener("click",async function(){
  if(!pendingPayload) return;
  var p=pendingPayload;
  var body={ cards:p.cards.map(function(c){return c.raw;}), field:p.field, value:p.value, charcId:p.charcId, charcName:p.charcName };
  spinOn($("confirmApply"),true,"Сохраняю на WB…");
  try{
    var j=await api("/api/wb/bulk-edit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(j.ok){ showStatus($("editStatus"),true,"Обновлено карточек: "+j.updated+". Изменения отправлены на Wildberries."); $("confirmBox").style.display="none"; pendingPayload=null; }
    else showStatus($("editStatus"),false,j.error||"Ошибка обновления");
  }catch(e){ showStatus($("editStatus"),false,"Не удалось связаться с сервером"); }
  finally{ spinOn($("confirmApply"),false,"Подтвердить — отправить на WB"); fit(); }
});

/* тема */
(function(){
  var root=document.documentElement,btn=$("theme-toggle");
  function sync(){ btn.textContent=root.getAttribute("data-theme")==="dark"?"☀":"☾"; }
  btn.addEventListener("click",function(){ root.setAttribute("data-theme",root.getAttribute("data-theme")==="dark"?"light":"dark"); sync(); });
  sync();
})();
